<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Borrow Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>LIBRARY BORROW MANAGEMENT</h1>

    <div class="stats">
        <div>Tổng phiếu: <span id="total">0</span></div>
        <div>Đang mượn: <span id="borrowing">0</span></div>
        <div>Đã trả: <span id="returned">0</span></div>
    </div>

    <button class="btn-add" onclick="openForm()">
        + THÊM PHIẾU MƯỢN
    </button>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Mã PM</th>
                <th>Người Mượn</th>
                <th>Mã Sách</th>
                <th>Thể Loại</th>
                <th>Ngày Mượn</th>
                <th>Hạn Trả</th>
                <th>Trạng Thái</th>
                <th>Thao Tác</th>
            </tr>
        </thead>

        <tbody id="borrowTable"></tbody>
    </table>

</div>

<!-- Modal -->

<div id="modal" class="modal">

    <div class="modal-content">

        <h2>Phiếu Mượn Sách</h2>

        <form id="borrowForm">

            <label>Mã Phiếu Mượn</label>
            <input type="text" id="borrowId">
            <small id="borrowIdError" class="error"></small>

            <label>Họ Tên Người Mượn</label>
            <input type="text" id="borrowerName">
            <small id="borrowerNameError" class="error"></small>

            <label>Mã Sách</label>
            <input type="text" id="bookId">
            <small id="bookIdError" class="error"></small>

            <label>Thể Loại</label>
            <select id="category">
                <option value="">--Chọn--</option>
                <option>CNTT</option>
                <option>Kinh tế</option>
                <option>Ngoại ngữ</option>
                <option>Kỹ năng</option>
            </select>
            <small id="categoryError" class="error"></small>

            <label>Ngày Mượn</label>
            <input type="date" id="borrowDate">
            <small id="borrowDateError" class="error"></small>

            <label>Hạn Trả</label>
            <input type="date" id="returnDate">
            <small id="returnDateError" class="error"></small>

            <label>Số Điện Thoại</label>
            <input type="text" id="phone">
            <small id="phoneError" class="error"></small>

            <label>Email</label>
            <input type="text" id="email">
            <small id="emailError" class="error"></small>

            <label>Trạng Thái</label>
            <select id="status">
                <option value="">--Chọn--</option>
                <option>Đang mượn</option>
                <option>Đã trả</option>
            </select>
            <small id="statusError" class="error"></small>

            <label>Ghi Chú</label>
            <textarea id="note"></textarea>
            <small id="noteError" class="error"></small>

            <div class="btn-group">
                <button type="submit" class="save">
                    Lưu
                </button>

                <button
                    type="button"
                    class="cancel"
                    onclick="closeForm()">

                    Hủy

                </button>
            </div>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
